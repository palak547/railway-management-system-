<!DOCTYPE html>
<html>
<head>
    <title>Book Ticket</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="navbar">
        <a href="/dashboard">Dashboard</a>
        <a href="/search">Search Trains</a>
        <a href="/tickets">My Tickets</a>
        <a href="/logout">Logout</a>
    </div>
<div class="container">
    <h2>Book Ticket (Train {{ train_no }})</h2>

    <form method="POST">
        <input type="number" name="passengers" id="p" placeholder="Number of Passengers" onchange="generateFields()">

        <div id="passengerFields"></div>

        <button type="submit">Book Ticket</button>
    </form>
</div>

<script>
function generateFields() {
    let n = document.getElementById("p").value;
    let div = document.getElementById("passengerFields");
    div.innerHTML = "";

    for (let i = 0; i < n; i++) {
        div.innerHTML += `
            <h4>Passenger ${i+1}</h4>
            <input type="text" name="name${i}" placeholder="Name">
            <input type="text" name="gender${i}" placeholder="Gender">
        `;
    }
}
</script>

</body>
</html>
